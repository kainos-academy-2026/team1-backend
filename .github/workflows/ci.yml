name: Backend CI

on:
  pull_request: # Trigger the workflow on pull request events for the main and master branches
  push:
    branches: [main]

jobs:
  backend-ci:
    name: Build, Lint, Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm # Cache npm dependencies to speed up builds

      - name: Install dependencies
        run: npm ci # Use npm ci for clean install of dependencies in CI environments

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run ci:check 

      - name: Test
        run: npm test